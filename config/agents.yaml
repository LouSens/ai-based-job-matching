# ─── KerjaCerdas Agent Configuration ──────────────────────────────────────────
# ANTIGRAVITY PROTOCOL §4.2 — Agent Behavior Config
# Referenced by: config/settings.py, src/agents/*.py

agents:
  orchestrator:
    model: gemini-2.0-flash
    temperature: 0.2          # Low — deterministic routing
    max_retries: 3
    timeout_sec: 30
    log_level: INFO
    tools: [route, summarize, escalate]

  matching_agent:
    model: indobert-base       # Fine-tuned on Indonesian job data
    confidence_threshold: 0.75
    top_k_results: 10
    region_weight: 0.3         # Boost local matches
    fallback: semantic_search

  skill_gap_agent:
    model: gemini-2.0-flash
    temperature: 0.4
    context_window: 4096
    rag_top_k: 5
    data_sources:
      - bps_occupations
      - linkedin_skills
      - dikti_courses

  advisor_agent:
    model: gemini-2.0-flash
    temperature: 0.7           # Creative career advice
    language: id               # Bahasa Indonesia primary
    fallback_language: en
    persona: "career counselor with 10 years Indonesia market experience"

  data_agent:
    schedule: "0 2 * * *"      # 2AM daily refresh
    sources:
      - jobstreet_api
      - indeed_scrape
      - bps_open_data
    validation: strict
    dedup_strategy: fuzzy_match
