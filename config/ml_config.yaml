# ─── KerjaCerdas ML Configuration ─────────────────────────────────────────────
# ANTIGRAVITY PROTOCOL §5 — ML Pipeline Hyperparameters
# Referenced by: src/ml/pipeline/*.py, src/ml/models/*.py

pipeline:
  seed: 42                     # Reproducibility: random.seed(42), torch.manual_seed(42)
  data_format: parquet         # Columnar, compressed
  feature_store_path: ./data/features/

model:
  base_model: indobert-base-uncased
  embedding_dim: 768
  max_sequence_length: 512

  # Bi-Encoder (fast retrieval)
  bi_encoder:
    learning_rate: 2.0e-5
    batch_size: 32
    epochs: 10
    warmup_ratio: 0.1
    weight_decay: 0.01

  # Cross-Encoder (reranking top-50)
  cross_encoder:
    learning_rate: 1.0e-5
    batch_size: 16
    epochs: 5
    top_n_candidates: 50

evaluation:
  metrics:
    - precision_at_5
    - recall_at_10
    - ndcg_at_10
    - mrr
  target_ndcg: 0.82
  fairness_dimensions:
    - region                   # Java vs outer islands
    - gender
    - education_level

deployment:
  export_format: onnx
  serve_framework: fastapi
  ab_test_traffic_pct: 10     # 10% to new model
  monitor:
    - latency
    - drift
    - feedback_loop

retraining:
  trigger: weekly
  min_new_postings: 500
